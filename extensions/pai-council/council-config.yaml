  deliberations: .pi/council/deliberations/
  memos:         .pi/council/memos/
  agents:        .pi/council/agents/

chair:
  name: Chair
  path: .pi/council/agents/chair.md
  color: "#7dcfff"

council:
  - name: Tech Skeptic
    path: .pi/council/agents/tech-skeptic.md
    color: "#ff6e96"
  - name: Product Thinker
    path: .pi/council/agents/product-thinker.md
    color: "#fede5d"
  - name: Contrarian
    path: .pi/council/agents/contrarian.md
    color: "#ff9e64"
  - name: Synthesizer
    path: .pi/council/agents/synthesizer.md
    color: "#72f1b8"
