meeting:
  constraints:
    max_time_minutes: 5
    max_budget: $5
    rounds_hint: 3
  editor: code
  brief_required_sections:
    - situation
    - stakes
    - constraints
    - key question

paths:
  briefs:        .pi/swarm/briefs/
  deliberations: .pi/swarm/deliberations/
  memos:         .pi/swarm/memos/
  agents:        .pi/swarm/agents/
  expertise:     .pi/swarm/expertise/
  skills:        .pi/swarm/skills/

ceo:
  name: CEO
  path: .pi/swarm/agents/ceo.md
  model: $default
  color: "#7dcfff"
  expertise: .pi/swarm/expertise/ceo-scratch-pad.md
  skills:
    - .pi/swarm/skills/mental-model.md

board:
